<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A90E2">
  <meta charset="UTF-8">

  <!-- 🔥 VERY IMPORTANT (fixes mobile layout) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - MEDIMATE</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .glass {
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input {
      background: #fff;
    }

    button {
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    /* 🌍 Language selector */
    .lang-box {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 5px;
      border-radius: 8px;
    }

    /* 🌙 Dark mode */
    body.dark {
      background: #121212;
      color: white;
    }

    body.dark .glass {
      background: rgba(255,255,255,0.1);
    }

    body.dark input {
      background: #1e1e1e;
      color: white;
    }
  </style>
</head>

<body onload="initApp()">

<!-- 🌍 Language -->
<select id="languageSelect" class="lang-box" onchange="changeLanguage()">
  <option value="en">EN</option>
  <option value="hi">HI</option>
  <option value="bn">BN</option>
</select>

<div class="container">

  <h1 id="title">🔐 MEDIMATE</h1>

  <div class="glass">
    <input type="text" id="username">
    <input type="password" id="password">

    <button id="registerBtn" onclick="register()"></button>
    <button id="loginBtn" onclick="login()"></button>
  </div>

</div>

<script>
// ================= INIT =================
function initApp() {
  applyLanguage();
  setPlaceholders();
  loadTheme();

  let savedLang = localStorage.getItem("lang") || "en";
  document.getElementById("languageSelect").value = savedLang;
}

// ================= LOGIN =================
function register() {
  let u = username.value.trim();
  let p = password.value.trim();

  if (!u || !p) return alert("Fill all fields");

  if (localStorage.getItem("user_" + u)) {
    return alert("User already exists");
  }

  localStorage.setItem("user_" + u, p);

  username.value = "";
  password.value = "";

  alert("Registered successfully ✅");
}

function login() {
  let u = username.value.trim();
  let p = password.value.trim();

  let stored = localStorage.getItem("user_" + u);

  if (!stored) return alert("User not found ❌");

  if (stored === p) {
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("currentUser", u);

    alert("Login successful ✅");

    // redirect
    window.location.href = "dashboard.html";
  } else {
    alert("Wrong password ❌");
  }
}

// ================= LANGUAGE =================
const translations = {
  en: {
    title: "🔐 MEDIMATE",
    username: "Username",
    password: "Password",
    register: "Register",
    login: "Login"
  },
  hi: {
    title: "🔐 मेडिमेट",
    username: "यूज़रनेम",
    password: "पासवर्ड",
    register: "रजिस्टर",
    login: "लॉगिन"
  },
  bn: {
    title: "🔐 মেডিমেট",
    username: "ইউজারনেম",
    password: "পাসওয়ার্ড",
    register: "রেজিস্টার",
    login: "লগইন"
  }
};

function changeLanguage() {
  let lang = languageSelect.value;
  localStorage.setItem("lang", lang);
  applyLanguage();
  setPlaceholders();
}

function applyLanguage() {
  let lang = localStorage.getItem("lang") || "en";

  title.innerText = translations[lang].title;
  registerBtn.innerText = translations[lang].register;
  loginBtn.innerText = translations[lang].login;
}

function setPlaceholders() {
  let lang = localStorage.getItem("lang") || "en";

  username.placeholder = translations[lang].username;
  password.placeholder = translations[lang].password;
}

// ================= DARK MODE =================
function loadTheme() {
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
  }
}
</script>
<script src="script.js"></script>
</body>
</html>
