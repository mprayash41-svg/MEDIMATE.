<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIMATE - Add Medicine</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A90E2">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c3e50);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.glass {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  font-weight: bold;
  font-size: 16px;
}

.back-btn {
  background: #ff6b6b;
}
</style>

</head>

<body>

<div class="container">

<h1>💊 MEDIMATE</h1>

<div class="glass">

<input id="medName" placeholder="Medicine Name">
<input id="medDose" placeholder="Dose">
<input type="time" id="medTime">

<button onclick="addMedicine()">➕ Add Medicine</button>

<button onclick="sendWhatsAppReminder()">💬 WhatsApp Reminder</button>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

</div>

<script>

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ===== NOTIFICATION PERMISSION =====
if ("Notification" in window) {
  Notification.requestPermission();
}

// ===== ADD MEDICINE =====
function addMedicine() {
  const name = document.getElementById("medName").value;
  const dose = document.getElementById("medDose").value;
  const time = document.getElementById("medTime").value;

  if (!name || !time) {
    alert("Please fill required fields");
    return;
  }

  let meds = JSON.parse(localStorage.getItem("meds")) || [];
  meds.push({name, dose, time});
  localStorage.setItem("meds", JSON.stringify(meds));

  alert("✅ Medicine Added");

  triggerReminder({name, dose});
}

// ===== NOTIFICATION =====
function triggerReminder(med) {
  if (Notification.permission === "granted") {
    new Notification("💊 MEDIMATE Reminder", {
      body: `${med.name} - ${med.dose}`
    });
  }

  if (navigator.vibrate) {
    navigator.vibrate([500,300,500]);
  }
}

// ===== WHATSAPP =====
function sendWhatsAppReminder() {
  const name = document.getElementById("medName").value;
  const dose = document.getElementById("medDose").value;
  const time = document.getElementById("medTime").value;

  if (!name || !time) {
    alert("Enter medicine & time");
    return;
  }

  const msg = `💊 MEDIMATE Reminder\nTake ${name}\nDose: ${dose}\nTime: ${time}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

// ===== BACK =====
function goBack() {
  window.history.back();
}

</script>
<script src="script.js"></script>
</body>
</html>
